spring.application.name=lumen
# Main application — Cassandra on
cassandra.enabled=true
spring.cassandra.contact-points=${CASSANDRA_CONTACT_POINTS:localhost}
spring.cassandra.port=${CASSANDRA_PORT:9042}
spring.cassandra.local-datacenter=${CASSANDRA_DC:datacenter1}
spring.cassandra.keyspace-name=${CASSANDRA_KEYSPACE:lumen}
grpc.server.port=9090