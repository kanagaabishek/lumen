<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumen — Distributed Trace Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-0: #0a0b0d;
      --bg-1: #111318;
      --bg-2: #1a1f2a;
      --bg-3: #24293a;
      --text-primary: #e5e5e5;
      --text-secondary: #999999;
      --text-tertiary: #666666;
      --border: #2a2f3a;
      --border-light: #353d50;
      --accent: #00e5ff;
      --accent-hover: #00f0ff;
      --accent-dim: #00e5ff1a;
      --warning: #ffb547;
      --warning-dim: #ffb5471a;
      --error: #ff4d6a;
      --error-dim: #ff4d6a1a;
      --success: #4ade80;
      --success-dim: #4ade801a;
      --font-mono: 'JetBrains Mono', monospace;
      --transition-fast: 80ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-base: 200ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-panel: 280ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    body.light-mode {
      --bg-0: #ffffff;
      --bg-1: #f8fafc;
      --bg-2: #f1f5f9;
      --bg-3: #e2e8f0;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-tertiary: #94a3b8;
      --border: #e2e8f0;
      --border-light: #cbd5e1;
      --accent: #0284c7;
      --accent-hover: #0369a1;
      --accent-dim: #0284c71a;
      --warning: #ea580c;
      --warning-dim: #ea580c1a;
      --error: #dc2626;
      --error-dim: #dc26261a;
      --success: #16a34a;
      --success-dim: #16a34a1a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-0);
      color: var(--text-primary);
      line-height: 1.5;
    }

    /* === HEADER === */
    .header {
      height: 52px;
      background: var(--bg-1);
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: auto 1fr auto auto auto;
      align-items: center;
      gap: 24px;
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: inherit;
      flex-shrink: 0;
    }

    .logo-glyph {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text-primary);
    }

    .logo-glyph::before {
      content: '◎ ';
      color: var(--accent);
    }

    .header-search {
      position: relative;
    }

    .search-input {
      width: 340px;
      height: 36px;
      padding: 0 14px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-primary);
      transition: all var(--transition-fast);
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--bg-1);
      box-shadow: inset 0 0 0 2px var(--accent-dim);
    }

    .search-input::placeholder {
      color: var(--text-tertiary);
    }

    .search-hint {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 10px;
      color: var(--text-tertiary);
      font-family: var(--font-mono);
      pointer-events: none;
    }

    .header-metrics {
      display: flex;
      gap: 20px;
      font-family: var(--font-mono);
      font-size: 11px;
    }

    .metric-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .metric-label {
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-size: 9px;
    }

    .metric-value {
      color: var(--accent);
      font-weight: 600;
      font-size: 12px;
    }

    .theme-toggle {
      display: flex;
      gap: 4px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px;
      flex-shrink: 0;
    }

    .theme-btn {
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all var(--transition-fast);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .theme-btn:hover {
      color: var(--text-primary);
    }

    .theme-btn.active {
      background: var(--accent);
      color: var(--bg-0);
    }

    /* === LAYOUT === */
    .container {
      display: flex;
      height: calc(100vh - 52px);
    }

    /* === SIDEBAR === */
    .sidebar {
      width: 240px;
      background: var(--bg-1);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .sidebar-section {
      border-bottom: 1px solid var(--border);
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .sidebar-header {
      padding: 16px 12px 8px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg-1);
      z-index: 10;
    }

    .sidebar-label {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-tertiary);
    }

    .services-list {
      overflow-y: auto;
      padding: 8px;
      flex: 1;
    }

    .service-item {
      height: 36px;
      padding: 0 12px;
      border-radius: 6px;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-secondary);
      transition: all var(--transition-fast);
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid transparent;
      margin-bottom: 4px;
      position: relative;
    }

    .service-item:hover {
      background: var(--bg-2);
      color: var(--text-primary);
    }

    .service-item.active {
      background: var(--accent-dim);
      color: var(--accent);
      border-left: 2px solid var(--accent);
      padding-left: 10px;
    }

    .service-status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--success);
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    .service-item.active .service-status-dot {
      animation: pulse-active 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    @keyframes pulse-active {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.1); }
    }

    .sidebar-footer {
      padding: 12px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-tertiary);
    }

    .sidebar-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-tertiary);
      font-size: 12px;
      height: 100%;
      padding: 20px;
      text-align: center;
    }

    /* === MAIN CONTENT === */
    .main {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      transition: margin-right var(--transition-panel);
      margin-right: 0;
    }

    .main.panel-open {
      margin-right: 640px;
    }

    .main-inner {
      padding: 24px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    /* === TOOLBAR === */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      background: var(--bg-0);
      z-index: 20;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .toolbar-label {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .time-buttons {
      display: flex;
      gap: 6px;
    }

    .time-btn {
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-size: 11px;
      font-family: var(--font-mono);
      cursor: pointer;
      font-weight: 500;
      transition: all var(--transition-fast);
    }

    .time-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    .time-btn.active {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: var(--accent);
    }

    .toolbar-spacer {
      flex: 1;
    }

    /* === SECTION TITLE === */
    .section-title {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .trace-count {
      color: var(--accent);
    }

    /* === TRACE TABLE === */
    .trace-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .trace-table thead {
      background: var(--bg-2);
      position: sticky;
      top: 0;
      z-index: 15;
    }

    .trace-table th {
      padding: 12px 14px;
      text-align: left;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-tertiary);
      border-bottom: 1px solid var(--border);
    }

    .trace-table td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
    }

    .trace-table tbody tr {
      cursor: pointer;
      position: relative;
    }

    .trace-table tbody tr:hover {
      background: transparent;
    }

    .trace-table tbody tr:hover td {
      color: var(--text-secondary);
    }

    .trace-table tbody tr.selected {
      background: var(--bg-2);
      transition: all var(--transition-fast);
    }

    .trace-table tbody tr.selected::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--accent);
    }

    .trace-table tbody tr.selected td {
      color: var(--text-primary);
    }

    .trace-id {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--accent);
      font-weight: 500;
    }

    .duration-cell {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .duration-bar {
      height: 2px;
      border-radius: 1px;
      min-width: 4px;
      flex-shrink: 0;
      background: var(--success);
    }

    .duration-bar.warning {
      background: var(--warning);
    }

    .duration-bar.critical {
      background: var(--error);
    }

    .duration-value {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      font-family: var(--font-mono);
      height: 22px;
    }

    .status-ok {
      background: var(--success-dim);
      color: var(--success);
    }

    .status-error {
      background: var(--error-dim);
      color: var(--error);
    }

    .time-value {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-tertiary);
    }

    /* === EMPTY STATE === */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-tertiary);
      gap: 12px;
      padding: 40px 20px;
    }

    .empty-icon {
      font-size: 48px;
      opacity: 0.3;
    }

    .empty-text {
      font-size: 14px;
    }

    /* === SKELETON LOADER === */
    .skeleton-rows {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .skeleton-row {
      height: 44px;
      background: linear-gradient(90deg, var(--bg-2) 0%, var(--bg-3) 50%, var(--bg-2) 100%);
      border-radius: 4px;
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* === DETAIL PANEL === */
    .detail-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 640px;
      height: 100vh;
      background: var(--bg-1);
      border-left: 1px solid var(--border);
      z-index: 100;
      transform: translateX(100%);
      transition: transform var(--transition-panel);
      display: flex;
      flex-direction: column;
    }

    .detail-panel.open {
      transform: translateX(0);
    }

    .panel-header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-shrink: 0;
    }

    .panel-title {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .panel-trace-id {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .panel-duration-display {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }

    .panel-duration {
      font-family: var(--font-mono);
      font-size: 48px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -1px;
    }

    .panel-duration-unit {
      font-family: var(--font-mono);
      font-size: 18px;
      color: var(--text-secondary);
    }

    .close-btn {
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all var(--transition-fast);
    }

    .close-btn:hover {
      background: var(--bg-2);
      color: var(--text-primary);
      border-color: var(--border-light);
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    /* === STATS GRID === */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px;
    }

    .stat-label {
      font-family: var(--font-mono);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-tertiary);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .stat-value {
      font-family: var(--font-mono);
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .stat-value.accent {
      color: var(--accent);
    }

    /* === BOTTLENECK ALERT === */
    .bottleneck-alert {
      border-left: 3px solid var(--error);
      padding: 14px 16px;
      margin-bottom: 24px;
      background: transparent;
    }

    .alert-content {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .alert-label {
      color: var(--text-primary);
      font-weight: 600;
    }

    .alert-pct {
      color: var(--error);
      font-weight: 700;
    }

    /* === WATERFALL === */
    .panel-section {
      margin-bottom: 24px;
    }

    .panel-section-title {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      padding-bottom: 10px;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .waterfall-rows {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .waterfall-row {
      display: flex;
      align-items: center;
      gap: 12px;
      height: 28px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
    }

    .waterfall-row:last-child {
      border-bottom: none;
    }

    .waterfall-label {
      width: 150px;
      flex-shrink: 0;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-secondary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .waterfall-track {
      flex: 1;
      height: 4px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 2px;
      position: relative;
    }

    .waterfall-bar {
      position: absolute;
      height: 100%;
      border-radius: 2px;
      background: var(--accent);
      opacity: 0.6;
      top: 0;
      animation: slide-in 0.4s ease-out forwards;
      transform-origin: left;
    }

    .waterfall-bar.warning {
      background: var(--warning);
    }

    .waterfall-bar.critical {
      background: var(--error);
    }

    @keyframes slide-in {
      from {
        transform: scaleX(0);
        opacity: 0;
      }
      to {
        transform: scaleX(1);
        opacity: 0.6;
      }
    }

    .waterfall-duration {
      width: 60px;
      flex-shrink: 0;
      text-align: right;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-tertiary);
    }

    /* === SPAN TREE === */
    .span-tree {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .span-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      position: relative;
    }

    .span-item:last-child {
      border-bottom: none;
    }

    .span-item.bottleneck {
      background: var(--error-dim);
      padding-left: 12px;
      padding-right: 12px;
      margin: 0 -12px;
      border-left: 2px solid var(--error);
    }

    .span-indent {
      flex-shrink: 0;
      position: relative;
    }

    .span-indent::after {
      content: '';
      position: absolute;
      right: -8px;
      top: 0;
      bottom: 0;
      width: 1px;
      background: var(--border);
    }

    .span-indent::before {
      content: '';
      position: absolute;
      right: -8px;
      top: 50%;
      width: 8px;
      height: 1px;
      background: var(--border);
      transform: translateY(-50%);
    }

    .span-name {
      flex: 1;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-secondary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .span-name.critical {
      color: var(--warning);
    }

    .span-name.bottleneck {
      color: var(--error);
      font-weight: 600;
    }

    .span-badges {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .span-badge {
      padding: 3px 8px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      font-family: var(--font-mono);
    }

    .span-badge.critical {
      background: var(--warning-dim);
      color: var(--warning);
    }

    .span-badge.bottleneck {
      background: var(--error-dim);
      color: var(--error);
    }

    .span-timing {
      display: flex;
      gap: 12px;
      flex-shrink: 0;
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--text-tertiary);
    }

    /* === SCROLLBAR === */
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-light);
      border-radius: 2px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--border);
    }

    /* === RESPONSIVE === */
    @media (max-width: 1280px) {
      .header {
        gap: 16px;
      }

      .search-input {
        width: 280px;
      }

      .detail-panel {
        width: 540px;
      }

      .main.panel-open {
        margin-right: 540px;
      }

      .sidebar {
        width: 200px;
      }

      .header-metrics {
        gap: 12px;
      }
    }

    @media (max-width: 768px) {
      .main.panel-open {
        margin-right: 0;
      }

      .detail-panel {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <a class="logo">
    <div class="logo-glyph">LUMEN</div>
  </a>

  <div class="header-search">
    <input class="search-input" type="text" placeholder="/ Search traces…" id="global-search">
    <span class="search-hint">⌘K</span>
  </div>

  <div class="header-metrics">
    <div class="metric-item">
      <span class="metric-label">Spans</span>
      <span class="metric-value" id="metric-ingested">—</span>
    </div>
    <div class="metric-item">
      <span class="metric-label">Queue</span>
      <span class="metric-value" id="metric-queue">—</span>
    </div>
  </div>

  <div class="theme-toggle" id="theme-toggle">
    <button class="theme-btn active" id="dark-btn" onclick="setTheme('dark')" title="Dark">🌙</button>
    <button class="theme-btn" id="light-btn" onclick="setTheme('light')" title="Light">☀️</button>
  </div>
</div>

<!-- Main layout -->
<div class="container">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-header">
        <div class="sidebar-label">Services</div>
      </div>
      <div class="services-list" id="services-list">
        <div class="sidebar-empty">
          <div style="text-align: center;">
            <div style="font-size: 20px; margin-bottom: 8px;">⟳</div>
            <div style="font-size: 11px;">Loading…</div>
          </div>
        </div>
      </div>
    </div>

    <div class="sidebar-footer">
      v0.1.0
    </div>
  </div>

  <!-- Main content -->
  <div class="main">
    <div id="traces-view">
      <div class="main-inner">
        <div class="empty-state">
          <div class="empty-icon">📊</div>
          <div class="empty-text">Select a service to view traces</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Detail panel -->
<div class="detail-panel" id="detail-panel">
  <div class="panel-header">
    <div class="panel-title">
      <div class="panel-trace-id" id="panel-trace-id">—</div>
      <div class="panel-duration-display">
        <span id="panel-duration" class="panel-duration">—</span>
        <span class="panel-duration-unit">ms</span>
      </div>
    </div>
    <button class="close-btn" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<script>
const API = 'http://localhost:8080';
let currentService = null;
let currentTimeRange = 3600000;
let allTraces = [];

function initTheme() {
  const saved = localStorage.getItem('lumen-theme') || 'dark';
  setTheme(saved);
}

function setTheme(theme) {
  const isDark = theme === 'dark';
  document.body.classList.toggle('light-mode', !isDark);
  document.getElementById('dark-btn').classList.toggle('active', isDark);
  document.getElementById('light-btn').classList.toggle('active', !isDark);
  localStorage.setItem('lumen-theme', theme);
}

async function init() {
  initTheme();
  loadMetrics();
  loadServices();
  setInterval(loadMetrics, 10000);
}

async function loadMetrics() {
  try {
    const r = await fetch(`${API}/api/metrics`);
    const m = await r.json();
    document.getElementById('metric-ingested').textContent = (m.spans_ingested_total ?? 0).toLocaleString();
    document.getElementById('metric-queue').textContent = (m.queue_depth ?? 0).toLocaleString();
  } catch {
    document.getElementById('metric-ingested').textContent = '—';
    document.getElementById('metric-queue').textContent = '—';
  }
}

async function loadServices() {
  try {
    const r = await fetch(`${API}/api/services`);
    const services = await r.json();
    const el = document.getElementById('services-list');
    if (!services.length) {
      el.innerHTML = '<div class="sidebar-empty">No services</div>';
      return;
    }
    el.innerHTML = services.map(s => `
      <div class="service-item" onclick="selectService('${s}')" id="svc-${s}">
        <div class="service-status-dot"></div>
        <span style="flex: 1; overflow: hidden; text-overflow: ellipsis;">${s}</span>
      </div>
    `).join('');
  } catch {
    document.getElementById('services-list').innerHTML = '<div class="sidebar-empty">Failed to load</div>';
  }
}

function selectService(name) {
  currentService = name;
  document.querySelectorAll('.service-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`svc-${name}`);
  if (el) el.classList.add('active');
  loadTraces();
}

async function loadTraces() {
  if (!currentService) return;
  const to = Date.now();
  const from = to - currentTimeRange;

  document.getElementById('traces-view').innerHTML = `
    <div class="main-inner">
      <div class="toolbar">
        <span class="toolbar-label">Time Range</span>
        <div class="time-buttons">
          ${[[900000,'15m'],[3600000,'1h'],[10800000,'3h'],[86400000,'24h']]
            .map(([ms,l]) => `<button class="time-btn ${currentTimeRange===ms?'active':''}" onclick="setTimeRange(${ms})">${l}</button>`)
            .join('')}
        </div>
        <div class="toolbar-spacer"></div>
      </div>
      <div class="skeleton-rows">
        ${[...Array(8)].map(() => '<div class="skeleton-row"></div>').join('')}
      </div>
    </div>
  `;

  try {
    const r = await fetch(`${API}/api/traces?service=${encodeURIComponent(currentService)}&from=${from}&to=${to}`);
    allTraces = await r.json();
    renderTraces(allTraces);
  } catch {
    document.getElementById('traces-view').innerHTML = `
      <div class="main-inner">
        <div class="empty-state">
          <div class="empty-icon">⚠</div>
          <div class="empty-text">Failed to load traces</div>
        </div>
      </div>
    `;
  }
}

function setTimeRange(ms) {
  currentTimeRange = ms;
  loadTraces();
}

function renderTraces(traces) {
  if (!traces.length) {
    document.getElementById('traces-view').innerHTML = `
      <div class="main-inner">
        <div class="toolbar">
          <span class="toolbar-label">Time Range</span>
          <div class="time-buttons">
            ${[[900000,'15m'],[3600000,'1h'],[10800000,'3h'],[86400000,'24h']]
              .map(([ms,l]) => `<button class="time-btn ${currentTimeRange===ms?'active':''}" onclick="setTimeRange(${ms})">${l}</button>`)
              .join('')}
          </div>
        </div>
        <div class="empty-state">
          <div class="empty-icon">✨</div>
          <div class="empty-text">No traces in this time range</div>
        </div>
      </div>
    `;
    return;
  }

  const maxDur = Math.max(...traces.map(t => t.durationMs));

  document.getElementById('traces-view').innerHTML = `
    <div class="main-inner">
      <div class="toolbar">
        <span class="toolbar-label">Time Range</span>
        <div class="time-buttons">
          ${[[900000,'15m'],[3600000,'1h'],[10800000,'3h'],[86400000,'24h']]
            .map(([ms,l]) => `<button class="time-btn ${currentTimeRange===ms?'active':''}" onclick="setTimeRange(${ms})">${l}</button>`)
            .join('')}
        </div>
        <div class="toolbar-spacer"></div>
      </div>
      <div class="section-title">
        <span class="trace-count">${traces.length}</span> trace${traces.length!==1?'s':''}
      </div>
      <table class="trace-table">
        <thead>
          <tr>
            <th style="width: 140px;">Trace ID</th>
            <th style="width: 160px;">Service</th>
            <th style="width: 140px;">Operation</th>
            <th style="width: 150px;">Duration</th>
            <th style="width: 100px;">Status</th>
            <th style="width: 110px;">Time</th>
          </tr>
        </thead>
        <tbody>
          ${traces.map(t => {
            const barPct = Math.max(4, Math.round((t.durationMs / maxDur) * 60));
            let barClass = '';
            if (t.durationMs > 1000) barClass = 'critical';
            else if (t.durationMs > 500) barClass = 'warning';
            const now = Date.now();
            const ago = Math.floor((now - t.startTimeMs) / 1000);
            let timeStr = '';
            if (ago < 60) timeStr = ago + 's ago';
            else if (ago < 3600) timeStr = Math.floor(ago / 60) + 'm ago';
            else timeStr = Math.floor(ago / 3600) + 'h ago';
            const absTime = new Date(t.startTimeMs).toLocaleTimeString();
            return `
              <tr onclick="openTrace('${t.traceId}', event)" title="${absTime}">
                <td class="trace-id">${t.traceId.substring(0, 12)}…</td>
                <td>${currentService}</td>
                <td>${t.rootOperation || '—'}</td>
                <td>
                  <div class="duration-cell">
                    <div class="duration-bar ${barClass}" style="width: ${barPct}px;"></div>
                    <span class="duration-value">${t.durationMs}ms</span>
                  </div>
                </td>
                <td>
                  <span class="status-badge ${t.hasError ? 'status-error' : 'status-ok'}">
                    ${t.hasError ? '● ERR' : '● OK'}
                  </span>
                </td>
                <td class="time-value">${timeStr}</td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

async function openTrace(traceId, evt) {
  document.getElementById('panel-trace-id').textContent = `Trace ${traceId.substring(0, 16)}…`;
  document.getElementById('panel-duration').textContent = '—';
  document.getElementById('panel-body').innerHTML = '<div class="empty-state"><div style="font-size: 20px;">⟳</div></div>';
  document.getElementById('detail-panel').classList.add('open');
  document.querySelector('.main').classList.add('panel-open');

  document.querySelectorAll('.trace-table tbody tr').forEach(r => r.classList.remove('selected'));
  evt.currentTarget.classList.add('selected');

  try {
    const r = await fetch(`${API}/api/traces/${traceId}`);
    const trace = await r.json();
    renderTraceDetail(trace);
  } catch {
    document.getElementById('panel-body').innerHTML = '<div class="empty-state"><div class="empty-text">Failed to load</div></div>';
  }
}

function closePanel() {
  document.getElementById('detail-panel').classList.remove('open');
  document.querySelector('.main').classList.remove('panel-open');
  document.querySelectorAll('.trace-table tbody tr').forEach(r => r.classList.remove('selected'));
}

function renderTraceDetail(trace) {
  document.getElementById('panel-trace-id').textContent = `Trace ${trace.traceId.substring(0, 16)}…`;
  document.getElementById('panel-duration').textContent = trace.totalDurationMs;

  const criticalSet = new Set(trace.criticalPathSpanIds || []);
  const bottleneck = trace.bottleneckSpanId;
  const botPct = trace.totalDurationMs > 0
    ? Math.round((trace.bottleneckSelfTimeMs / trace.totalDurationMs) * 100)
    : 0;

  const flatSpans = [];
  function flatten(node, depth) {
    flatSpans.push({ node, depth });
    (node.childrens || []).forEach(c => flatten(c, depth + 1));
  }
  if (trace.root) flatten(trace.root, 0);

  const traceStart = trace.root?.span?.startTimeByNano || 0;
  const traceDur = (trace.totalDurationMs * 1_000_000) || 1;

  let html = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Duration</div>
        <div class="stat-value">${trace.totalDurationMs}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Span Count</div>
        <div class="stat-value accent">${flatSpans.length}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Critical Path</div>
        <div class="stat-value accent">${(trace.criticalPathSpanIds||[]).length}</div>
      </div>
    </div>
  `;

  if (bottleneck) {
    const node = findNode(trace.root, bottleneck);
    if (node) {
      html += `
        <div class="bottleneck-alert">
          <div class="alert-content">
            <span class="alert-label">⚠ Bottleneck:</span>
            <span>${node.span.operationName}</span>
            <span>•</span>
            <span>${trace.bottleneckSelfTimeMs}ms</span>
            <span>•</span>
            <span class="alert-pct">${botPct}%</span>
          </div>
        </div>
      `;
    }
  }

  html += `
    <div class="panel-section">
      <div class="panel-section-title">Span Waterfall</div>
      <div class="waterfall-rows">
        ${flatSpans.map(({ node, depth }, i) => {
          const s = node.span;
          const start = s.startTimeByNano - traceStart;
          const dur = s.durationMs * 1_000_000;
          const left = Math.round((start / traceDur) * 100);
          const width = Math.max(1, Math.round((dur / traceDur) * 100));
          const isCrit = criticalSet.has(s.spanId);
          const isBot = s.spanId === bottleneck;
          let barClass = '';
          if (isBot) barClass = 'critical';
          else if (isCrit) barClass = 'warning';
          return `
            <div class="waterfall-row" style="animation-delay: ${i * 20}ms;">
              <div class="waterfall-label">${s.operationName}</div>
              <div class="waterfall-track">
                <div class="waterfall-bar ${barClass}" style="left: ${left}%; width: ${width}%;"></div>
              </div>
              <div class="waterfall-duration">${s.durationMs}ms</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-section-title">Span Hierarchy</div>
      <div class="span-tree">
        ${flatSpans.map(({ node, depth }) => {
          const s = node.span;
          const isCrit = criticalSet.has(s.spanId);
          const isBot = s.spanId === bottleneck;
          return `
            <div class="span-item ${isBot ? 'bottleneck' : ''}">
              ${depth > 0 ? `<div class="span-indent" style="width: ${depth * 16}px;"></div>` : `<div class="span-indent" style="width: 16px;"></div>`}
              <div class="span-name ${isBot ? 'bottleneck' : isCrit ? 'critical' : ''}">${s.operationName}</div>
              <div class="span-badges">
                ${isBot ? '<span class="span-badge bottleneck">Bottleneck</span>' : ''}
                ${isCrit && !isBot ? '<span class="span-badge critical">Critical</span>' : ''}
              </div>
              <div class="span-timing">
                <span>self: ${node.selfTimeMs}ms</span>
                <span>total: ${s.durationMs}ms</span>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;

  document.getElementById('panel-body').innerHTML = html;
}

function findNode(node, spanId) {
  if (!node) return null;
  if (node.span.spanId === spanId) return node;
  for (const c of (node.childrens || [])) {
    const found = findNode(c, spanId);
    if (found) return found;
  }
  return null;
}

document.addEventListener('click', e => {
  const panel = document.getElementById('detail-panel');
  if (panel.classList.contains('open') &&
      !panel.contains(e.target) &&
      !e.target.closest('.trace-table')) {
    closePanel();
  }
});

init();
</script>
</body>
</html>
